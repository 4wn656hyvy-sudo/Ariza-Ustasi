<!DOCTYPE html>

<html>

<head>

<title>Arıza Ustası</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{

background:#111;

color:white;

font-family:Arial;

padding:20px;

text-align:center;

}

.kutu{

background:#222;

padding:20px;

border-radius:15px;

margin-top:20px;

}

a{

color:white;

text-decoration:none;

}

button{

padding:12px;

margin-top:10px;

border:none;

border-radius:10px;

}

input{

width:90%;

padding:12px;

border-radius:10px;

border:none;

}

#sonuc{

margin-top:15px;

padding:15px;

background:#333;

border-radius:10px;

display:none;

}

</style>

</head>

<body>

<div class="kutu">

<a href="#">Ana Sayfa</a> |

<a href="#">Araç</a> |

<a href="#">Jeneratör</a> |

<a href="#">Elektrik</a>

</div>

<h1>🔧 Arıza Ustası</h1>

<div class="kutu">

<h2>Hoş Geldin 👋</h2>

<p>Arızanı yaz veya aşağıdaki konulardan seç.</p>

</div>

<input

id="arama"

placeholder="Örnek: akü"

onkeyup="ara()"

/>

<div id="sonuc"></div>

<div class="kutu">

<h3>Popüler Sorunlar</h3>

<p><a href="tik-tik-sesi.html">🚗 Marş basıyor tık tık sesi</a></p>

<p><a href="aku-calismiyor.html">🔋 Akü var araç çalışmıyor</a></p>

<p><a href="dizel-gec-calisiyor.html">🚘 Dizel araç geç çalışıyor</a></p>

<p><a href="adblue-sorunu.html">🛠️ AdBlue sorunu</a></p>

</div>

<div class="kutu">

<h2>📩 Arızanı Gönder</h2>

<input id="sorun" placeholder="Sorununu yaz">

<button onclick="mesajGonder()">

Gönder

</button>

</div>

<script>

function ara(){

let yazi=

document.getElementById("arama")

.value.toLowerCase();

let sonuc=

document.getElementById("sonuc");

if(yazi.includes("akü")){

sonuc.style.display="block";

sonuc.innerHTML=

"🔋 Akü bağlantıları ve voltaj kontrol edilmeli.";

}else{

sonuc.style.display="none";

}

}

function mesajGonder(){

let yazi=

document.getElementById("sorun").value;

alert("Mesaj alındı: "+yazi);

}

</script>

</body>

</html>
